<head>
    <link rel="stylesheet" href="../components/base.css">
</head>

<style>
    body {
        margin: 0;
    }

    footer {
        background-color: var(--foreground-color);
        color: var(--text-color);
        text-align: center;
        padding: 16px 8px;
        font-size: 14px;
        border-top: 1px solid var(--border-color);
    }

    #discordUsernameCopy,
    #pageOpen,
    #pageOpen:visited {
        color: var(--text-color);
        cursor: pointer;
        background-color: transparent;
        border: none;
        padding: 0;
        margin: 0;
        text-decoration: underline;
    }

    #discordUsernameCopy:hover,
    #pageOpen:hover {
        color: var(--accent-color);
    }
</style>

<body>
  <footer>
    <p>
      Not affiliated with or endorsed by 
      <a id="pageOpen" href="https://www.roblox.com/games/80200604311136/" target="_blank" rel="noopener">Car Zone</a>.
    </p>
    <p>
      Contact me on Discord if there are any issues: 
      <button id="discordUsernameCopy" aria-label="Copy Discord username" title="Click to copy">flamespill</button>
    </p>
  </footer>

  <script>
    document.getElementById('discordUsernameCopy').addEventListener('click', () => {
      navigator.clipboard.writeText('flamespill')
        .then(() => alert('Discord Username has been copied to clipboard'))
        .catch(console.error);
    });
  </script>
</body>
